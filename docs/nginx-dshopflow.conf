# DropShipFlow nginx 反向代理（两个域名）
# 放到 nginx 的 conf.d/，改好证书路径后 nginx -t && reload。
#
# proxy_pass 目标二选一（看你的 nginx 跑在哪）：
#   A) 宿主机 nginx：容器需把端口映射到 127.0.0.1（见 DEPLOY.md 第 4 节的 ports），
#      proxy_pass http://127.0.0.1:8801;（后端） / http://127.0.0.1:3001;（后台）
#   B) Docker 内 nginx（与本项目同一 compose 网络）：直接用服务名，
#      proxy_pass http://dsf-backend:8000;（后端） / http://dsf-admin:3000;（后台）
# 下面默认写的是 A（宿主机）；用 B 就把对应两行 proxy_pass 换掉。

# 复用的代理头
# （nginx 不支持 include 片段变量，这里直接在每个 location 内写全）

# ========================= 后端 API：appapi.dshopflow.com =========================
server {
    listen 80;
    listen [::]:80;
    server_name appapi.dshopflow.com;
    # certbot HTTP 验证
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name appapi.dshopflow.com;

    ssl_certificate     /etc/letsencrypt/live/appapi.dshopflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/appapi.dshopflow.com/privkey.pem;

    client_max_body_size 20m;        # 商品/图文详情体积稍大

    location / {
        proxy_pass http://127.0.0.1:8801;        # A 宿主机；B 改 http://dsf-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;        # 后台抓取/同步可能稍久
        proxy_send_timeout  120s;
    }
}

# ========================= 管理后台：app.dshopflow.com =========================
server {
    listen 80;
    listen [::]:80;
    server_name app.dshopflow.com;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.dshopflow.com;

    ssl_certificate     /etc/letsencrypt/live/app.dshopflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.dshopflow.com/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3001;        # A 宿主机；B 改 http://dsf-admin:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Next.js 长连接/HMR（生产可有可无，留着无害）
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout  120s;
    }
}
