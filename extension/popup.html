<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { width: 100%; min-width: 260px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8fafc; color: #1e293b; display: flex; flex-direction: column; }
    .header { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; padding: 10px 14px; font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; align-items: center; flex: 0 0 auto; }
    .header .badge { font-size: 10px; opacity: .85; font-weight: 500; }
    .scroll { flex: 1 1 auto; overflow-y: auto; }
    .body { padding: 12px; }
    .hidden { display: none !important; }
    .btn { padding: 9px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; width: 100%; transition: transform .08s ease, box-shadow .15s ease, filter .15s ease; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
    .btn-primary:hover { filter: brightness(1.05); box-shadow: 0 4px 14px rgba(99,102,241,.35); }
    .btn:active { transform: scale(.96); }
    #btn-scrape { position: relative; overflow: hidden; }
    #btn-scrape.pop { animation: pop .32s ease; }
    @keyframes pop { 0% { transform: scale(1); } 35% { transform: scale(.94); } 100% { transform: scale(1); } }
    .ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,.55); transform: scale(0); animation: ripple .55s linear; pointer-events: none; }
    @keyframes ripple { to { transform: scale(3); opacity: 0; } }
    .brand { cursor: pointer; transition: opacity .15s; }
    .brand:hover { opacity: .85; text-decoration: underline; }
    .btn-secondary { background: #f1f5f9; color: #666; border: 1px solid #e2e8f0; }
    .btn-danger { background: #fff; color: #ef4444; border: 1px solid #fecaca; font-size: 11px; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    .card { border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; margin-bottom: 8px; background: #fff; }
    .card img { width: 100%; max-height: 140px; object-fit: cover; display: block; background: #f1f5f9; }
    .card-body { padding: 8px; }
    .card-title { font-weight: 600; font-size: 12px; margin-bottom: 4px; line-height: 1.4; }
    .card-price { color: #ef4444; font-weight: 700; font-size: 14px; }
    .card-meta { font-size: 11px; color: #666; margin-top: 2px; }
    .row { display: flex; gap: 8px; margin-top: 12px; }
    .footer { font-size: 10px; color: #999; display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-top: 1px solid #e2e8f0; background: #fff; flex: 0 0 auto; }
    .center { text-align: center; padding: 24px 12px; }
    .error { color: #ef4444; font-size: 11px; margin-top: 6px; }
    .success-icon { font-size: 40px; margin-bottom: 8px; }

    /* 最近选品列表 */
    .section { padding: 4px 12px 12px; }
    .section-head { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
    .section-title { font-size: 12px; font-weight: 700; color: #334155; }
    .link-btn { background: none; border: none; color: #6366f1; font-size: 11px; cursor: pointer; font-weight: 600; }
    .recent-item { display: flex; gap: 8px; align-items: center; padding: 8px; border: 1px solid #e2e8f0; border-radius: 8px; background: #fff; margin-bottom: 6px; cursor: pointer; transition: border-color .15s; }
    .recent-item:hover { border-color: #c7d2fe; }
    .recent-thumb { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; background: #f1f5f9; flex: 0 0 auto; }
    .recent-info { flex: 1 1 auto; min-width: 0; }
    .recent-title { font-size: 12px; font-weight: 600; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .recent-sub { font-size: 11px; color: #64748b; margin-top: 2px; display: flex; gap: 6px; align-items: center; }
    .recent-time { font-size: 10px; color: #94a3b8; margin-left: auto; white-space: nowrap; }
    .recent-cost { color: #ef4444; font-weight: 700; }
    .tag { font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
    .empty { text-align: center; color: #94a3b8; font-size: 12px; padding: 20px 8px; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <span class="brand" id="brand" title="打开管理后台">⚡ DropShipFlow</span>
    <span style="display:flex;align-items:center;gap:8px;">
      <span class="badge" id="headerStatus"></span>
      <button id="btn-settings" title="设置后端域名" style="background:none;border:none;color:#fff;cursor:pointer;font-size:15px;line-height:1;padding:2px;opacity:.9;">⚙</button>
    </span>
  </div>

  <div class="scroll">

    <!-- STATE: SETTINGS -->
    <div id="view-settings" class="body hidden">
      <h3 style="font-size:13px;margin-bottom:10px;">⚙ 后端域名设置</h3>
      <label style="display:block;font-size:11px;color:#64748b;margin-bottom:4px;">后端地址（API）</label>
      <input id="cfgApi" type="text" placeholder="http://localhost:8000"
        style="width:100%;padding:7px 9px;font-size:12px;border:1px solid #cbd5e1;border-radius:6px;margin-bottom:10px;"/>
      <label style="display:block;font-size:11px;color:#64748b;margin-bottom:4px;">管理后台地址</label>
      <input id="cfgAdmin" type="text" placeholder="http://localhost:3000"
        style="width:100%;padding:7px 9px;font-size:12px;border:1px solid #cbd5e1;border-radius:6px;margin-bottom:6px;"/>
      <p style="font-size:10px;color:#94a3b8;margin-bottom:10px;line-height:1.5;">留空恢复默认 localhost。保存时会请求访问该域名的权限。</p>
      <div id="cfgErr" class="error hidden"></div>
      <div class="row" style="margin-top:6px;">
        <button class="btn btn-primary" id="btn-cfg-save" style="flex:1;">保存</button>
        <button class="btn btn-secondary" id="btn-cfg-cancel" style="flex:1;">取消</button>
      </div>
      <button class="link-btn" id="btn-cfg-reset" style="display:block;margin:12px auto 0;">恢复默认（localhost）</button>
    </div>

    <!-- STATE: LOGGED OUT -->
    <div id="view-logout" class="body center hidden">
      <div style="font-size:48px;margin-bottom:12px;">🔌</div>
      <h3 style="margin-bottom:8px;">欢迎使用 DropShipFlow</h3>
      <p style="color:#666;font-size:13px;margin-bottom:20px;">1688 商品一键上架到 Shopify</p>
      <button class="btn btn-primary" id="btn-login">🔗 登录 / 注册</button>
      <p style="font-size:11px;color:#999;margin-top:12px;">点击后将打开 Web 管理后台<br/>登录后自动连接插件</p>
    </div>

    <!-- LOGGED-IN WRAPPER -->
    <div id="main" class="hidden">

      <!-- 操作区：抓取 / 预览 / 成功 -->
      <div class="body" style="padding-bottom:0;">
        <!-- 抓取（一键入池）-->
        <div id="view-idle">
          <button class="btn btn-primary" id="btn-scrape">📥 抓取并加入选品池</button>
          <p id="idleHint" style="color:#94a3b8;font-size:11px;text-align:center;margin-top:8px;">点击后在后台抓取，可立即切去浏览/抓取下一个</p>
          <label style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;font-size:11px;color:#64748b;cursor:pointer;user-select:none;">
            <input type="checkbox" id="closeTabChk"/> 抓取完成后关闭该商品页
          </label>
          <div id="scrapeStatus" style="min-height:0;"></div>
          <div id="scrapeCounter" style="font-size:11px;color:#6366f1;text-align:center;margin-top:8px;min-height:14px;"></div>
          <div class="error hidden" id="errIdle"></div>
        </div>

      </div>

      <!-- 最近选品列表 -->
      <div class="section">
        <div class="section-head">
          <span class="section-title">📋 最近选品</span>
          <button class="link-btn" id="btn-refresh">🔄 刷新</button>
        </div>
        <div id="recentList">
          <div class="empty">加载中…</div>
        </div>
      </div>

    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer hidden" id="footer">
    <span>👤 <span id="userEmail"></span></span>
    <button class="btn-danger" id="btn-logout">退出</button>
  </div>

<script src="config.js"></script>
<script src="popup.js"></script>
</body>
</html>
